services:
  personal-website:
    container_name: personal-website
    image: johnbjohn/personal-website:latest
    labels:
      - "tsdproxy.enable=true"
      - "tsdproxy.name=portfolio"
    restart: always
    volumes:
      - ./src:/app/src
      - ./astro.config.mjs:/app/astro.config.mjs
      - ./public:/app/public
      - ./tsconfig.json:/app/tsconfig.json
    ports:
      - 2389:2389
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: bunx --bun astro dev --host --port 2389
